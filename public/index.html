<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On The Move | Туризм</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="overlay"></div>
      <nav class="nav container">
        <a class="logo" href="/">
          <img class="logo-mark" src="./images/logo.svg" alt="" width="28" height="28" />
          <span>On the Move</span>
        </a>
        <ul class="menu nav-actions">
          <li><a href="#about">О нас</a></li>
          <li><a href="#countries">Топ стран</a></li>
          <li class="nav-auth-group">
            <div class="nav-user" id="nav-user-root">
              <button
                id="auth-btn"
                type="button"
                class="nav-btn nav-btn--primary nav-btn--icon-only"
                aria-expanded="false"
                aria-haspopup="true"
                aria-label="Войти"
                title="Войти"
              >
                <svg
                  class="lucide lucide-user-round"
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <circle cx="12" cy="8" r="5" />
                  <path d="M20 21a8 8 0 0 0-16 0" />
                </svg>
              </button>
              <div id="user-dropdown" class="nav-user__dropdown hidden" role="menu" aria-hidden="true">
                <a href="/profile.html" class="nav-user__item" role="menuitem">
                  <svg
                    class="lucide nav-user__item-icon"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
                    />
                  </svg>
                  <span>Избранное</span>
                </a>
                <button type="button" id="logout-dropdown-btn" class="nav-user__item nav-user__item--button" role="menuitem">
                  <svg
                    class="lucide nav-user__item-icon"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M11 20H2" />
                    <path
                      d="M11 4.562v16.157a1 1 0 0 0 1.242.97L19 20V5.562a2 2 0 0 0-1.515-1.94l-4-1A2 2 0 0 0 11 4.561z"
                    />
                    <path d="M11 4H8a2 2 0 0 0-2 2v14" />
                    <path d="M14 12h.01" />
                    <path d="M22 20h-3" />
                  </svg>
                  <span>Выйти из профиля</span>
                </button>
              </div>
            </div>
          </li>
        </ul>
      </nav>
      <div class="hero-content container">
        <h1 class="hero-title-animate">Путешествуй, чтобы жить</h1>
        <p class="hero-tagline-animate">Открой мир через новые впечатления</p>
      </div>
    </header>

    <main>
      <section id="countries" class="countries-section">
        <div class="countries-section__inner container">
          <h2>Топ-6 стран для путешествий</h2>
          <div id="countries-grid" class="countries-grid"></div>
        </div>
      </section>

      <section id="about" class="about-section">
        <div class="container about-inner">
          <h2 class="about-heading">Почему путешествия меняют нас</h2>
          <p class="about-lead" id="about-lead" aria-live="polite" data-typewriter-text="Путешествия - это не просто смена обстановки. Это возможность выйти из зоны комфорта, увидеть мир другими глазами и обогатить внутренний мир. Каждое путешествие дарит новые знания, знакомства и воспоминания, которые остаются на всю жизнь."></p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 On the move — вдохновляйся и путешествуй</p>
    </footer>

    <div id="auth-modal" class="auth-modal hidden">
      <div class="auth-backdrop" data-close-auth="true"></div>
      <div class="auth-dialog">
        <h3 id="auth-title" class="auth-title">Вход</h3>
        <form id="auth-form" class="auth-form">
          <label for="auth-name" id="name-label" class="hidden">Имя</label>
          <input id="auth-name" class="hidden" type="text" placeholder="Ваше имя" />

          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" required />

          <label for="auth-password">Пароль</label>
          <input id="auth-password" type="password" placeholder="Минимум 6 символов" required />

          <button id="auth-submit" type="submit" class="auth-submit">Войти</button>
          <p id="auth-error" class="auth-error hidden"></p>
        </form>
        <button id="auth-switch-mode" class="auth-switch-mode" type="button">Нет аккаунта? Регистрация</button>
      </div>
    </div>

    <script src="./nav-user.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
